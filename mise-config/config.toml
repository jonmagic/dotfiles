# Global mise configuration (managed by ~/.dotfiles)
#
# Add per-project tool versions with a `mise.toml` in that project.

[settings]
# Prevent surprising installs when a command is missing.
not_found_auto_install = false

[tools]
# Add global tools here with `mise use -g` once you're ready.
# (Recommend starting with non-overlapping CLIs like ripgrep/ruff/etc.)
